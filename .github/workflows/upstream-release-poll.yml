name: upstream-release-poll

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check upstream release and dispatch update workflow if needed
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/poll-upstream-release.py
