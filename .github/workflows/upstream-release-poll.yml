name: upstream-release-poll

on:
  schedule:
    # Snapshot upstream once per day during the quieter UTC morning window.
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check upstream release and dispatch update workflow if needed
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/poll-upstream-release.py
