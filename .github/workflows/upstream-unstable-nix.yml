name: upstream-unstable-nix

on:
  pull_request:
    paths:
      - ".github/workflows/upstream-unstable-nix.yml"
      - ".github/workflows/upstream-unstable-poll.yml"
      - "checks/gsd-2.nix"
      - "pkgs/gsd-2/source-unstable.json"
      - "pkgs/gsd-2/source-unstable.nix"
      - "pkgs/gsd-2/unstable.nix"
      - "pkgs/gsd-2/graph.nix"
      - "scripts/poll-upstream-unstable.py"
      - "scripts/update-upstream-unstable.py"
  repository_dispatch:
    types:
      - upstream-unstable-update
  workflow_dispatch:

concurrency:
  group: upstream-unstable-nix-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}

      - name: Run flake checks
        run: nix flake check -L

  update:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Refresh upstream unstable metadata
        id: release
        run: python3 scripts/update-upstream-unstable.py --output-file "$GITHUB_OUTPUT"

      - name: Run flake checks after refresh
        if: steps.release.outputs.updated == 'true'
        run: nix flake check -L

      - name: Prepare pull request body
        if: steps.release.outputs.updated == 'true'
        run: |
          cat > "$RUNNER_TEMP/upstream-unstable-pr-body.md" <<'EOF'
          Automated refresh from upstream `main` at [${{ steps.release.outputs.short_sha }}](${{ steps.release.outputs.commit_url }}).

          - Current rev: `${{ steps.release.outputs.current_rev }}`
          - Updated rev: `${{ steps.release.outputs.target_rev }}`
          - Prefetched hash: `${{ steps.release.outputs.hash }}`

          The workflow updates `pkgs/gsd-2/source-unstable.json` and keeps the unstable package version tied to the moving upstream `main` commit.
          EOF

      - name: Create pull request
        if: steps.release.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/upstream-gsd-2-unstable-${{ steps.release.outputs.short_sha }}
          title: "chore(gsd-2): update unstable upstream to main@${{ steps.release.outputs.short_sha }}"
          commit-message: "chore(gsd-2): update unstable upstream to main@${{ steps.release.outputs.short_sha }}"
          body-path: ${{ runner.temp }}/upstream-unstable-pr-body.md
          delete-branch: true
