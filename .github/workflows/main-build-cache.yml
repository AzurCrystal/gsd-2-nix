name: main-build-cache

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.yml"
      - "apps/**"
      - "checks/**"
      - "flake.lock"
      - "flake.nix"
      - "modules/**"
      - "patches/**"
      - "pkgs/**"
      - "scripts/**"

concurrency:
  group: main-build-cache-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Run flake checks
        run: ./scripts/run-flake-check-ci.sh

      - name: Build primary package surfaces
        run: |
          nix build -L \
            .#gsd-2 \
            .#gsd-2-suite \
            .#gsd-2-unstable \
            .#gsd-2-unstable-suite
