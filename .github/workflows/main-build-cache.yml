name: main-build-cache

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.yml"
      - "apps/**"
      - "checks/**"
      - "flake.lock"
      - "flake.nix"
      - "modules/**"
      - "patches/**"
      - "pkgs/**"
      - "scripts/**"

concurrency:
  group: main-build-cache-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Classify changed scope
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - ".github/workflows/*.yml"
              - "apps/**"
              - "checks/**"
              - "flake.lock"
              - "flake.nix"
              - "modules/**"
              - "patches/**"
              - "pkgs/**"
              - "scripts/**"
              - "!pkgs/gsd-2/source.json"
              - "!pkgs/gsd-2/source.nix"
              - "!scripts/poll-upstream-release.py"
              - "!scripts/update-upstream-release.py"
            stable:
              - "pkgs/gsd-2/source.json"
              - "pkgs/gsd-2/source.nix"
              - "scripts/poll-upstream-release.py"
              - "scripts/update-upstream-release.py"

      - name: Report selected build scope
        run: |
          echo "shared=${{ steps.changes.outputs.shared }}"
          echo "stable=${{ steps.changes.outputs.stable }}"

      - name: Run full flake checks
        if: steps.changes.outputs.shared == 'true'
        run: ./scripts/run-flake-check-ci.sh

      - name: Run stable checks
        if: steps.changes.outputs.shared != 'true' && steps.changes.outputs.stable == 'true'
        run: |
          nix build -L \
            .#checks.x86_64-linux.gsd-2-blueprint \
            .#checks.x86_64-linux.gsd-2-runtime-smoke \
            .#checks.x86_64-linux.gsd-2-companion-smoke

      - name: Build full package surfaces
        if: steps.changes.outputs.shared == 'true'
        run: |
          nix build -L \
            .#gsd-2 \
            .#gsd-2-suite

      - name: Build stable package surfaces
        if: steps.changes.outputs.shared != 'true' && steps.changes.outputs.stable == 'true'
        run: |
          nix build -L \
            .#gsd-2 \
            .#gsd-2-suite
